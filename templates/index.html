<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindEase - Mental Health Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-box {
      width: 420px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: #5e60ce;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h2 { font-size: 22px; }
    .header p  { font-size: 13px; margin-top: 5px; opacity: 0.85; }

    .messages {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .bot-bubble {
      background: #f0f0ff;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .user-bubble {
      background: #5e60ce;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .input-row {
      display: flex;
      padding: 14px;
      border-top: 1px solid #eee;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
    }

    button {
      background: #5e60ce;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #4a4ab0; }
  </style>
</head>
<body>

<div class="chat-box">
  <div class="header">
    <h2>MindEase</h2>
    <p>A safe space to talk. I am always here.</p>
  </div>

  <div class="messages" id="messages">
    <div class="bubble bot-bubble">
      Hello! I am MindEase. How are you feeling today?
    </div>
  </div>

  <div class="input-row">
    <input
      type="text"
      id="user-input"
      placeholder="Type how you feel..."
      onkeydown="if(event.key === 'Enter') sendMessage()"
    />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  async function sendMessage() {
    const inputBox = document.getElementById('user-input');
    const messagesDiv = document.getElementById('messages');
    const userText = inputBox.value.trim();

    if (!userText) return;

    messagesDiv.innerHTML += `<div class="bubble user-bubble">${userText}</div>`;
    inputBox.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userText })
    });

    const data = await res.json();

    messagesDiv.innerHTML += `<div class="bubble bot-bubble">${data.reply}</div>`;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
</script>

</body>
</html>
